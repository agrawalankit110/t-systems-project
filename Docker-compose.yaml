version: "3.9"   
services:
  db:   
    image: postgres:15   
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: book
    ports:
      - "5432:5432"  
  app:   
    image: bookstore_image:latest
    ports:
      - "8000:8000"  
    environment:      
      POSTGRES_DB: book
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_SCHEMA: bookstore
    depends_on:
      - db   
